<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="register.html">Course Registration</a>
    <a href="learn.html">Course Learning</a>
    <a href="assessment.html">Assessment</a>
    <a href="feedback.html">Feedback</a>
    <a href="login.html">Login</a>
    <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">☀️</button>
</div>

<div class="container">
    <div class="card">
        <div class="row-container">
            
            <div class="text-side">
                <h1 style="margin-top: 0;">Login</h1>
                
                <form action="index.html" id="login-form">
                    <label>Username:</label>
                    <input type="text" id="login-username" required placeholder="Enter username">

                    <label>Password:</label>
                    <div class="password-container">
                        <input type="password" id="login-password" required placeholder="Enter password">
                        <span class="toggle-password">👁️</span>
                    </div>

                    <p id="login-error" style="color: red; font-size: 14px; text-align: center; margin-top: -10px; min-height: 20px;"></p>

                    <input type="submit" value="Login" style="width: 100%;">
                </form>

                <p style="text-align: center; margin-top: 20px;">
                    Don't have an account? <a href="signup.html">Sign Up here</a>
                </p>
            </div>

            <div class="image-side">
                <img src="login.png" alt="Login Illustration">
            </div>

        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
