<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="register.html">Course Registration</a>
    <a href="learn.html">Course Learning</a>
    <a href="assessment.html">Assessment</a>
    <a href="feedback.html">Feedback</a>
    <a href="login.html">Login</a>
    <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">☀️</button>
</div>

<div class="container" style="max-width: 450px;">
    <div class="card">
        <h1 style="text-align: center;">Create Account</h1>

        <form action="login.html" id="signup-form">
            
            <div class="drop-zone">
                📁 Drag & Drop Profile Picture Here or Click to Upload
                <input type="file" hidden accept="image/*">
                <div class="preview-container"></div>
            </div>

            <label>Full Name:</label>
            <input type="text" required>

            <label>Email:</label>
            <input type="email" required>

            <label>Password:</label>
            <div class="password-container">
                <input type="password" id="signup-password" required>
                <span class="toggle-password">👁️</span>
            </div>
            
            <div class="strength-meter"><div class="strength-bar" id="strength-bar"></div></div>

            <label>Confirm Password:</label>
            <div class="password-container">
                <input type="password" id="signup-confirm" required>
                <span class="toggle-password">👁️</span>
            </div>
            <p id="match-text" style="font-size: 12px; margin-top: -10px;"></p>

            <input type="submit" value="Sign Up" style="width: 100%;">
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
