<!DOCTYPE html>
<html>
<head>
<title>Feedback and Contact</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="register.html">Course Registration</a>
    <a href="learn.html">Course Learning</a>
    <a href="assessment.html">Assessment</a>
    <a href="feedback.html">Feedback</a>
    <a href="login.html">Login</a>
</div>

<div class="container">
    <div class="card">
        <h1>Feedback and Contact Us</h1>

        <div class="row-container">	
            <div class="text-side">
                <p>We value your feedback! Please fill out the form below or reach us via email.</p>

                <form>
                    <label>Your Name:</label>
                    <input type="text" placeholder="John Doe">

                    <label>Your Email:</label>
                    <input type="email" placeholder="john@example.com">

                    <label>Phone Number (Optional):</label>
                    <input type="text" id="phone-input" placeholder="(123) 456-7890">

                    <label>Rate your experience:</label>
                    <div class="star-rating">
                        <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                    </div>

                    <label>Your Feedback:</label>
                    <textarea rows="5" placeholder="Write your message here..."></textarea>

                    <div class="drop-zone" style="padding: 10px;">
                        📎 Attach a screenshot (Optional)
                        <input type="file" hidden accept="image/*">
                    </div>

                    <br>
                    <input type="submit" value="Send Feedback">
                </form>

                <hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

                <h3>Contact Details</h3>
                <p><strong>Email:</strong> info@gameslearningcenter.com</p>
                <p><strong>Phone:</strong> +91-9000000000</p>
            </div>

            <div class="image-side">
                <img src="contact.jpg" alt="Contact Us">
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
