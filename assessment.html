<!DOCTYPE html>
<html>
<head>
    <title>Assessment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="register.html">Course Registration</a>
    <a href="learn.html">Course Learning</a>
    <a href="assessment.html">Assessment</a>
    <a href="feedback.html">Feedback</a>
    <a href="login.html">Login</a>
    <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">☀️</button>
</div>

<div class="container">
    <div class="card">
        <h1>Games Assessment</h1>
        <h3 id="timer" style="color: #ff5252; text-align: right; margin-top: -40px;">Time Left: 00:10</h3>

        <div class="row-container">
            <div class="text-side">
                <form id="quiz-form">
                    
                    <div class="quiz-question">
                        <p><strong>1. How many players are there in a Cricket team?</strong></p>
                        <input type="radio" name="q1" value="9"> 9 Players<br>
                        <input type="radio" name="q1" value="11"> 11 Players<br>
                        <input type="radio" name="q1" value="12"> 12 Players
                    </div>

                    <div class="quiz-question">
                        <p><strong>2. Which game uses a goalpost?</strong></p>
                        <input type="radio" name="q2" value="Cricket"> Cricket<br>
                        <input type="radio" name="q2" value="Football"> Football
                    </div>

                    <div class="quiz-question">
                        <p><strong>3. Name one position in Football.</strong></p>
                        <input type="text" name="q3" placeholder="Type answer here...">
                    </div>

                    <input type="submit" value="Submit Answers">
                </form>
                
                <div id="quiz-result" style="margin-top: 20px; font-weight: bold;"></div>
            </div>

            <div class="image-side">
                <img src="quiz.png" alt="Assessment">
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
