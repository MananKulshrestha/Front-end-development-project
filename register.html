<!DOCTYPE html>
<html>
<head>
    <title>Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="register.html">Course Registration</a>
    <a href="learn.html">Course Learning</a>
    <a href="assessment.html">Assessment</a>
    <a href="feedback.html">Feedback</a>
    <a href="login.html">Login</a>
    <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">☀️</button>
</div>

<div class="container">
    <div class="card">
        <h1>Course Registration</h1>
        
        <div class="row-container">
            <div class="text-side">
                <p>Register to learn about Cricket and Football.</p>

                <form>
                    <label>Name:</label>
                    <input type="text" placeholder="Enter your full name">

                    <label>Email:</label>
                    <input type="email" placeholder="Enter your email">

                    <label>Select Course:</label>
                    <select>
                        <option>Cricket Basics</option>
                        <option>Football Basics</option>
                        <option>Cricket and Football Rules</option>
                    </select>

                    <br><br>
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">
                </form>
            </div>
            
            <div class="image-side">
                 <img src="signup.png" alt="Register">
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
